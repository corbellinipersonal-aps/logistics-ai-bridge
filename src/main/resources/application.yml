spring:
  datasource:
    url: jdbc:h2:file:./h2_data/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:your_email@gmail.com}
    password: ${EMAIL_PASSWORD:your_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

slack:
  webhook:
    url: ${SLACK_WEBHOOK_URL:https://hooks.slack.com/services/YOUR/WEBHOOK/URL}

groq:
  api:
    key: ${GROQ_API_KEY:your_key_here}
    url: https://api.groq.com/openai/v1/chat/completions
  model: llama-3.1-8b-instant

# --- AI Provider Selection ---
# Set ai.provider to one of: groq (default), openai, gemini
ai:
  provider: groq

openai:
  api:
    key: ${OPENAI_API_KEY:your_openai_key_here}
    url: https://api.openai.com/v1/chat/completions
  model: gpt-4o-mini

gemini:
  api:
    key: ${GEMINI_API_KEY:your_gemini_key_here}
    url: https://generativelanguage.googleapis.com/v1beta/models
  model: gemini-1.5-flash

resilience4j:
  retry:
    instances:
      ai-provider:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - com.example.apibridge.exception.AIExtractionException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
  circuitbreaker:
    instances:
      ai-provider:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
